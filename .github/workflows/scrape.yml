name: Weekly Film Scraper

on:
  schedule:
    # Every Monday at 2am UTC (noon AEST)
    - cron: "0 2 * * 1"
  workflow_dispatch:  # Allow manual runs from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scraper/scrape.py

      - name: Commit updated film data
        run: |
          git config --global user.name  "Film Scraper Bot"
          git config --global user.email "bot@github-actions"
          git add docs/data/films.json
          git add docs/posters/
          git diff --staged --quiet || git commit -m "chore: weekly film data update $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
