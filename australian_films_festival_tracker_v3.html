
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body,div{font-family:'DM Sans',sans-serif;color:var(--color-text-primary)}
  .wrap{padding:0 0 2rem}
  .hero{padding:2rem 1.5rem 1.2rem;border-bottom:0.5px solid var(--color-border-tertiary)}
  .hero h1{font-family:'Playfair Display',serif;font-size:1.85rem;font-weight:700;line-height:1.2;margin-bottom:.3rem}
  .hero p{font-size:12px;color:var(--color-text-secondary);letter-spacing:.05em;text-transform:uppercase}
  .controls{display:flex;flex-wrap:wrap;gap:8px;padding:1rem 1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);align-items:center}
  .controls input,.controls select{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 11px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);color:var(--color-text-primary)}
  .controls input{flex:1;min-width:180px}
  .controls select:focus,.controls input:focus{outline:none;border-color:var(--color-border-primary)}
  .stat-bar{display:flex;gap:1.5rem;padding:.6rem 1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;color:var(--color-text-secondary);flex-wrap:wrap}
  .stat-bar strong{color:var(--color-text-primary);font-weight:500}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.9rem;padding:1.1rem 1.5rem}
  .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;display:flex;flex-direction:column;transition:border-color .18s}
  .card:hover{border-color:var(--color-border-secondary)}
  .poster-wrap{height:170px;position:relative;overflow:hidden;background:var(--color-background-tertiary)}
  .poster-wrap img{width:100%;height:100%;object-fit:cover;display:block}
  .poster-fallback{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:1rem;gap:8px}
  .poster-fallback .icon{font-size:28px;opacity:.25}
  .poster-fallback .fb-title{font-family:'Playfair Display',serif;font-style:italic;font-size:.85rem;color:var(--color-text-tertiary);text-align:center;line-height:1.3}
  .fest-badge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:500;padding:2px 7px;border-radius:var(--border-radius-md);letter-spacing:.03em}
  .year-tag{position:absolute;bottom:8px;right:8px;font-size:10px;font-weight:500;padding:2px 7px;background:rgba(0,0,0,.6);color:#fff;border-radius:var(--border-radius-md)}
  .genre-strip{display:flex;flex-wrap:wrap;gap:4px;padding:.6rem 1rem .2rem}
  .genre-pill{font-size:10px;padding:2px 7px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
  .card-body{padding:.5rem 1rem .8rem;flex:1;display:flex;flex-direction:column;gap:4px}
  .card-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;line-height:1.3}
  .card-director{font-size:11px;color:var(--color-text-secondary)}
  .card-synopsis{font-size:11px;color:var(--color-text-secondary);line-height:1.5;margin-top:3px;flex:1}
  .card-footer{border-top:0.5px solid var(--color-border-tertiary);padding:.6rem 1rem;font-size:11px;color:var(--color-text-secondary)}
  .card-footer span{color:var(--color-text-primary);font-weight:500}
  .award-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
  .award-pill{font-size:10px;padding:2px 7px;border-radius:var(--border-radius-md);background:var(--color-background-warning);color:var(--color-text-warning)}
  .empty{padding:3rem 1.5rem;text-align:center;color:var(--color-text-secondary);font-size:14px;grid-column:1/-1}
  .f-cannes{background:#1a3a5c;color:#b5d4f4}
  .f-venice{background:#4a1b0c;color:#f5c4b3}
  .f-berlin{background:#26215c;color:#cecbf6}
  .f-sundance{background:#04342c;color:#9fe1cb}
  .f-tiff{background:#173404;color:#c0dd97}
  .f-tribeca{background:#412402;color:#fac775}
  .f-rotterdam{background:#3c3489;color:#afa9ec}
  .f-busan{background:#4b1528;color:#f4c0d1}
  .f-sxsw{background:#085041;color:#5dcaa5}
</style>
<div class="wrap">
  <div class="hero">
    <h1>Australian Cinema on the World Stage</h1>
    <p>Australian films at major international festivals · 1999–2025</p>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search by title or director…" oninput="render()">
    <select id="fest" onchange="render()">
      <option value="">All festivals</option>
      <option>Cannes</option><option>Venice</option><option>Berlin</option>
      <option>Sundance</option><option>TIFF</option><option>Tribeca</option>
      <option>Rotterdam</option><option>Busan</option><option>SXSW</option>
    </select>
    <select id="genre" onchange="render()">
      <option value="">All genres</option>
      <option>Drama</option><option>Horror</option><option>Thriller</option>
      <option>Crime</option><option>Indigenous</option><option>Sci-Fi</option>
      <option>Romance</option><option>Historical</option><option>Comedy</option>
    </select>
    <select id="yr" onchange="render()"></select>
  </div>
  <div class="stat-bar" id="stats"></div>
  <div class="grid" id="grid"></div>
</div>

const festColors={Cannes:"f-cannes",Venice:"f-venice",Berlin:"f-berlin",Sundance:"f-sundance",TIFF:"f-tiff",Tribeca:"f-tribeca",Rotterdam:"f-rotterdam",Busan:"f-busan",SXSW:"f-sxsw"};

const yrSel=document.getElementById('yr');
yrSel.innerHTML='<option value="">All years</option>';
[...new Set(FILMS.map(f=>f.year))].sort((a,b)=>b-a).forEach(y=>{
  const o=document.createElement('option');o.value=y;o.textContent=y;yrSel.appendChild(o);
});

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const fest=document.getElementById('fest').value;
  const yr=document.getElementById('yr').value;
  const genre=document.getElementById('genre').value;
  const list=FILMS.filter(f=>{
    if(fest&&f.fest!==fest)return false;
    if(yr&&f.year!==+yr)return false;
    if(genre&&!f.genres.includes(genre))return false;
    if(q&&!f.title.toLowerCase().includes(q)&&!f.dir.toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('stats').innerHTML=`<span><strong>${list.length}</strong> film${list.length!==1?'s':''}</span><span><strong>${[...new Set(list.map(f=>f.fest))].length}</strong> festival${[...new Set(list.map(f=>f.fest))].length!==1?'s':''}</span><span><strong>${[...new Set(list.map(f=>f.year))].length}</strong> year${[...new Set(list.map(f=>f.year))].length!==1?'s':''}</span>`;
  const grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML='<div class="empty">No films match your filters.</div>';return;}
  grid.innerHTML=list.map(f=>`
    <div class="card">
      <div class="poster-wrap">
        ${f.poster?`<img src="${f.poster}" alt="${f.title}" onerror="this.parentElement.innerHTML='<div class=poster-fallback><div class=icon>🎬</div><div class=fb-title>${f.title.replace(/['"]/g,'')}</div></div>'">`:`<div class="poster-fallback"><div class="icon">🎬</div><div class="fb-title">${f.title}</div></div>`}
        <span class="fest-badge ${festColors[f.fest]||''}">${f.fest}</span>
        <span class="year-tag">${f.year}</span>
      </div>
      <div class="genre-strip">${f.genres.map(g=>`<span class="genre-pill">${g}</span>`).join('')}</div>
      <div class="card-body">
        <div class="card-title">${f.title}</div>
        <div class="card-director">Dir. ${f.dir}</div>
        <div class="card-synopsis">${f.synopsis}</div>
        ${f.award?`<div class="award-row"><span class="award-pill">★ ${f.award}</span></div>`:''}
      </div>
      <div class="card-footer">
        <div>${f.section}</div>
        <div style="margin-top:3px">Distributor: <span>${f.dist||'—'}</span></div>
      </div>
    </div>
  `).join('');
}
render();
</script>
