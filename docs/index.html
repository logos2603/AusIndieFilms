<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Australian Films at International Festivals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sand:    #f0ebe1;
      --ink:     #1a1612;
      --rust:    #c4440a;
      --gold:    #b8882a;
      --muted:   #7a6e62;
      --card-bg: #faf7f2;
      --border:  #ddd5c8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--sand);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 2rem;
    }

    .site-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    h1 em {
      font-style: italic;
      color: var(--rust);
    }

    .header-meta {
      text-align: right;
    }

    .film-count {
      font-family: 'DM Mono', monospace;
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--rust);
      line-height: 1;
    }

    .film-count-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ── Controls ── */
    .controls {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.25rem 2rem 0;
      border-bottom: 1px solid var(--border);
    }

    .controls-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      padding-bottom: 1rem;
    }

    .controls-row + .controls-row {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .row-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      min-width: 3.5rem;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--ink);
      padding: 0.5rem 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
    }

    .search-wrap input::placeholder { color: var(--muted); font-style: italic; }

    .filter-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .pill:hover, .pill.active {
      background: var(--ink);
      color: var(--sand);
      border-color: var(--ink);
    }

    .year-filter-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .year-input {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      width: 4.5rem;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--ink);
      padding: 0.35rem 0;
      color: var(--ink);
      outline: none;
      text-align: center;
    }

    .year-input::placeholder { color: var(--muted); }

    .year-sep {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }

    /* Category pills — Narrative & Documentary */
    .pill.category-narrative {
      color: var(--muted);
      border-color: var(--muted);
    }
    .pill.category-narrative:hover,
    .pill.category-narrative.active {
      background: var(--muted);
      color: var(--sand);
      border-color: var(--muted);
    }

    .pill.category-doc {
      color: var(--gold);
      border-color: var(--gold);
    }
    .pill.category-doc:hover,
    .pill.category-doc.active {
      background: var(--gold);
      color: var(--sand);
      border-color: var(--gold);
    }

    .sort-select {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      outline: none;
      appearance: none;
    }

    /* ── Grid ── */
    .grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.4s ease forwards;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .card:hover {
      box-shadow: 4px 4px 0 var(--ink);
      transform: translate(-2px, -2px);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--border);
    }

    .card-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--muted);
    }

    .card-body {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .card-festivals {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .doc-tag {
      color: var(--gold);
      border-color: var(--gold);
    }

    .narrative-tag {
      color: var(--muted);
      border-color: var(--border);
    }

    .festival-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--rust);
      border: 1px solid var(--rust);
      padding: 0.15rem 0.5rem;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 400;
      line-height: 1.2;
    }

    .card-director {
      font-style: italic;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .card-synopsis {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      margin-top: auto;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .rating {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .rating-source {
      color: var(--muted);
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .rating-value { color: var(--ink); font-size: 0.85rem; }

    .card-links {
      margin-left: auto;
      display: flex;
      gap: 0.5rem;
    }

    .card-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .card-link:hover { color: var(--rust); border-color: var(--rust); }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
      font-style: italic;
      font-size: 1.2rem;
    }

    /* ── Footer ── */
    footer {
      max-width: 1400px;
      margin: 3rem auto 0;
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .last-updated { color: var(--rust); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 22, 18, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--card-bg);
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      transform: translateY(24px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
      opacity: 1;
    }

    .modal-inner {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 0;
    }

    @media (max-width: 540px) {
      .modal-inner { grid-template-columns: 1fr; }
      .modal-poster-col { display: none; }
    }

    .modal-poster-col img,
    .modal-poster-col .modal-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--border);
    }

    .modal-poster-col .modal-poster-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--muted);
    }

    .modal-content {
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.2rem;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }

    .modal-close:hover { color: var(--ink); }

    .modal-title {
      font-size: 1.6rem;
      font-weight: 400;
      line-height: 1.15;
    }

    .modal-title span {
      color: var(--muted);
      font-weight: 300;
    }

    .modal-director {
      font-style: italic;
      color: var(--muted);
      font-size: 1rem;
    }

    .modal-festivals {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .modal-synopsis {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--ink);
    }

    .modal-meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .modal-meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .modal-meta-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .modal-meta-value {
      font-size: 0.95rem;
      color: var(--ink);
    }

    .modal-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .modal-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--rust);
      text-decoration: none;
      border-bottom: 1px solid var(--rust);
      padding-bottom: 1px;
      transition: opacity 0.15s;
    }

    .modal-link:hover { opacity: 0.7; }

    /* Make cards clickable */
    .card { cursor: pointer; }

  </style>
</head>
<body>

  <header>
    <div>
      <p class="site-eyebrow">Tracking Australian Cinema Worldwide</p>
      <h1>Australian Films at<br/><em>International Festivals</em></h1>
    </div>
    <div class="header-meta">
      <div class="film-count" id="film-count">–</div>
      <div class="film-count-label">films tracked</div>
    </div>
  </header>

  <div class="controls">

    <!-- Row 1: Search + Sort -->
    <div class="controls-row">
      <div class="search-wrap" style="flex:1;min-width:200px">
        <input type="text" id="search" placeholder="Search by title, director, genre…" />
      </div>
      <select class="sort-select" id="sort">
        <option value="year-desc">Newest first</option>
        <option value="year-asc">Oldest first</option>
        <option value="title-asc">A → Z</option>
        <option value="rating-desc">Highest rated</option>
      </select>
    </div>

    <!-- Row 2: Festival filters -->
    <div class="controls-row">
      <span class="row-label">Festival</span>
      <div class="filter-group" id="festival-filters">
        <button class="pill active" data-festival="all">All</button>
        <button class="pill" data-festival="Cannes">Cannes</button>
        <button class="pill" data-festival="Venice">Venice</button>
        <button class="pill" data-festival="Berlin">Berlin</button>
        <button class="pill" data-festival="Sundance">Sundance</button>
        <button class="pill" data-festival="Toronto">TIFF</button>
        <button class="pill" data-festival="Rotterdam">Rotterdam</button>
        <button class="pill" data-festival="SXSW">SXSW</button>
        <button class="pill" data-festival="Sitges">Sitges</button>
      </div>
    </div>

    <!-- Row 3: Year + Category filters -->
    <div class="controls-row">
      <span class="row-label">Filter</span>
      <div class="year-filter-wrap">
        <span class="row-label">Year</span>
        <input class="year-input" id="year-from" type="number" placeholder="From" min="1980" max="2030" />
        <span class="year-sep">—</span>
        <input class="year-input" id="year-to" type="number" placeholder="To" min="1980" max="2030" />
      </div>
      <button class="pill category-narrative" id="narrative-filter">Narrative</button>
      <button class="pill category-doc" id="doc-filter">Documentary</button>
    </div>

  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <p>Data sourced from TMDB · IMDb · Letterboxd · Screen Australia</p>
    <p>Last updated: <span class="last-updated" id="last-updated">–</span></p>
  </footer>

  <!-- Film detail modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-inner">
        <div class="modal-poster-col" id="modal-poster-col"></div>
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <div class="modal-title" id="modal-title"></div>
              <div class="modal-director" id="modal-director"></div>
            </div>
            <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
          </div>
          <div class="modal-festivals" id="modal-festivals"></div>
          <div class="modal-synopsis" id="modal-synopsis"></div>
          <div class="modal-meta-grid" id="modal-meta-grid"></div>
          <div class="modal-links" id="modal-links"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allFilms = [];
    let activeFestival = "all";
    let searchQuery = "";
    let sortBy = "year-desc";

    async function loadFilms() {
      try {
        const res = await fetch("data/films.json");
        allFilms = await res.json();
        document.getElementById("film-count").textContent = allFilms.length;
        setLastUpdated();
        render();
      } catch (e) {
        document.getElementById("grid").innerHTML =
          '<p class="empty">Could not load film data.</p>';
      }
    }

    function setLastUpdated() {
      const dates = allFilms.map(f => f.added_at).filter(Boolean).sort().reverse();
      if (dates[0]) {
        const d = new Date(dates[0]);
        document.getElementById("last-updated").textContent =
          d.toLocaleDateString("en-AU", { day: "numeric", month: "long", year: "numeric" });
      }
    }

    let docsOnly = false;
    let narrativeOnly = false;
    let yearFrom = null;
    let yearTo = null;

    function filtered() {
      let films = [...allFilms];

      if (activeFestival !== "all") {
        films = films.filter(f =>
          f.festivals && f.festivals.some(fest => {
            const norm = fest === "Toronto (TIFF)" ? "Toronto" : fest;
            return norm.toLowerCase().includes(activeFestival.toLowerCase());
          })
        );
      }

      if (docsOnly) {
        films = films.filter(f =>
          (f.genres || []).some(g => g.toLowerCase() === "documentary")
        );
      }

      if (narrativeOnly) {
        films = films.filter(f =>
          !(f.genres || []).some(g => g.toLowerCase() === "documentary")
        );
      }

      if (yearFrom !== null) films = films.filter(f => f.year >= yearFrom);
      if (yearTo   !== null) films = films.filter(f => f.year <= yearTo);

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        films = films.filter(f =>
          f.title.toLowerCase().includes(q) ||
          (f.director && f.director.toLowerCase().includes(q)) ||
          (f.genres && f.genres.some(g => g.toLowerCase().includes(q)))
        );
      }

      films.sort((a, b) => {
        if (sortBy === "year-desc") return (b.year - a.year) || a.title.localeCompare(b.title);
        if (sortBy === "year-asc")  return (a.year - b.year) || a.title.localeCompare(b.title);
        if (sortBy === "title-asc") return a.title.localeCompare(b.title);
        if (sortBy === "rating-desc") {
          const ra = a.tmdb_rating || a.imdb_rating || 0;
          const rb = b.tmdb_rating || b.imdb_rating || 0;
          return rb - ra;
        }
        return 0;
      });

      return films;
    }

    function render() {
      const grid = document.getElementById("grid");
      const films = filtered();

      document.getElementById("film-count").textContent = films.length;

      if (!films.length) {
        grid.innerHTML = '<p class="empty">No films match your search.</p>';
        return;
      }

      grid.innerHTML = films.map((f, i) => filmCard(f, i)).join("");
    }

    function filmCard(f, i) {
      const delay = Math.min(i * 40, 400);
      const poster = f.poster_url
        ? `<img class="card-poster" src="${f.poster_url}" alt="${escHtml(f.title)} poster" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="card-poster-placeholder" style="display:none">🎬</div>`
        : `<div class="card-poster-placeholder">🎬</div>`;

      const FESTIVAL_LABELS = {
        "Toronto": "TIFF",
        "Toronto (TIFF)": "TIFF",
      };
      const isDoc = (f.genres || []).some(g => g.toLowerCase() === "documentary");
      const docTag = isDoc
        ? `<span class="festival-tag doc-tag">Documentary</span>`
        : `<span class="festival-tag narrative-tag">Narrative</span>`;

      const festivals = (f.festivals || [])
        .map(fest => {
          const label = FESTIVAL_LABELS[fest] || fest;
          return `<span class="festival-tag">${escHtml(label)}</span>`;
        })
        .join("");

      const ratings = [

        f.imdb_rating    ? ratingChip("IMDb",        f.imdb_rating.toFixed(1))      : "",
        f.letterboxd_rating ? ratingChip("LB",       f.letterboxd_rating.toFixed(1)) : "",
      ].filter(Boolean).join("");

      const links = [
        f.imdb_id          ? `<a class="card-link" href="https://www.imdb.com/title/${f.imdb_id}/" target="_blank" rel="noopener">IMDb</a>` : "",
        f.letterboxd_url   ? `<a class="card-link" href="${f.letterboxd_url}" target="_blank" rel="noopener">Letterboxd</a>` : "",
        f.screen_australia_url ? `<a class="card-link" href="${f.screen_australia_url}" target="_blank" rel="noopener">Screen AU</a>` : "",
      ].filter(Boolean).join("");

      return `
        <div class="card" data-idx="${i}" style="animation-delay:${delay}ms">
          ${poster}
          <div class="card-body">
            <div class="card-festivals">${festivals}${docTag}</div>
            <div class="card-title">${escHtml(f.title)} <span style="color:var(--muted);font-weight:300">${f.year}</span></div>
            ${f.director ? `<div class="card-director">dir. ${escHtml(f.director)}</div>` : ""}
            ${f.synopsis ? `<div class="card-synopsis">${escHtml(f.synopsis)}</div>` : ""}
            <div class="card-meta">
              ${ratings}
              ${links ? `<div class="card-links">${links}</div>` : ""}
            </div>
          </div>
        </div>`;
    }

    function ratingChip(source, value) {
      return `
        <div class="rating">
          <span class="rating-source">${source}</span>
          <span class="rating-value">★ ${value}</span>
        </div>`;
    }

    function formatCurrency(amount) {
      if (amount >= 1000000) return `$${(amount / 1000000).toFixed(1)}M`;
      if (amount >= 1000)    return `$${(amount / 1000).toFixed(0)}K`;
      return `$${amount}`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── Event listeners ──
    document.getElementById("search").addEventListener("input", e => {
      searchQuery = e.target.value;
      render();
    });

    document.getElementById("festival-filters").addEventListener("click", e => {
      const btn = e.target.closest(".pill");
      if (!btn) return;
      activeFestival = btn.dataset.festival;
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      render();
    });

    document.getElementById("doc-filter").addEventListener("click", function() {
      docsOnly = !docsOnly;
      if (docsOnly) narrativeOnly = false;
      this.classList.toggle("active", docsOnly);
      document.getElementById("narrative-filter").classList.toggle("active", false);
      render();
    });

    document.getElementById("narrative-filter").addEventListener("click", function() {
      narrativeOnly = !narrativeOnly;
      if (narrativeOnly) docsOnly = false;
      this.classList.toggle("active", narrativeOnly);
      document.getElementById("doc-filter").classList.toggle("active", false);
      render();
    });

    document.getElementById("sort").addEventListener("change", e => {
      sortBy = e.target.value;
      render();
    });

    document.getElementById("year-from").addEventListener("input", e => {
      const v = parseInt(e.target.value);
      yearFrom = isNaN(v) ? null : v;
      render();
    });

    document.getElementById("year-to").addEventListener("input", e => {
      const v = parseInt(e.target.value);
      yearTo = isNaN(v) ? null : v;
      render();
    });


    // ── Modal ──────────────────────────────────────────────────────────────────

    const overlay   = document.getElementById("modal-overlay");
    const modal     = document.getElementById("modal");

    function openModal(film) {
      const FESTIVAL_LABELS = { "Toronto": "TIFF", "Toronto (TIFF)": "TIFF" };

      // Poster
      const posterCol = document.getElementById("modal-poster-col");
      if (film.poster_url) {
        posterCol.innerHTML = `<img src="${film.poster_url}" alt="${escHtml(film.title)}" />`;
      } else {
        posterCol.innerHTML = `<div class="modal-poster-placeholder">🎬</div>`;
      }

      // Title + director
      document.getElementById("modal-title").innerHTML =
        `${escHtml(film.title)} <span>${film.year}</span>`;
      document.getElementById("modal-director").textContent =
        film.director ? `dir. ${film.director}` : "";

      // Festivals
      document.getElementById("modal-festivals").innerHTML =
        (film.festivals || []).map(f => {
          const label = FESTIVAL_LABELS[f] || f;
          return `<span class="festival-tag">${escHtml(label)}</span>`;
        }).join("") +
        ((film.genres||[]).some(g=>g.toLowerCase()==="documentary")
          ? `<span class="festival-tag doc-tag">Documentary</span>`
          : `<span class="festival-tag narrative-tag">Narrative</span>`);

      // Synopsis
      document.getElementById("modal-synopsis").textContent =
        film.synopsis || "No synopsis available.";

      // Meta grid
      const meta = [];
      if (film.runtime_mins) meta.push(["Runtime", `${film.runtime_mins} min`]);
      if (film.genres && film.genres.length) meta.push(["Genres", film.genres.join(", ")]);
      if (film.imdb_rating)       meta.push(["IMDb", `★ ${film.imdb_rating.toFixed(1)}`]);
      if (film.letterboxd_rating) meta.push(["Letterboxd", `★ ${film.letterboxd_rating.toFixed(1)}`]);
      if (film.sales_agent)       meta.push(["Intl. Sales Agent", film.sales_agent]);
      if (film.distributor_intl)  meta.push(["Intl. Distributor", film.distributor_intl]);
      if (film.distributor)       meta.push(["AU Distributor", film.distributor]);
      if (film.budget && film.budget > 0)   meta.push(["Budget", formatCurrency(film.budget)]);
      if (film.revenue && film.revenue > 0) meta.push(["Box Office", formatCurrency(film.revenue)]);
      document.getElementById("modal-meta-grid").innerHTML =
        meta.map(([label, val]) => `
          <div class="modal-meta-item">
            <span class="modal-meta-label">${label}</span>
            <span class="modal-meta-value">${escHtml(String(val))}</span>
          </div>`).join("");

      // Links
      const links = [];
      if (film.imdb_id)
        links.push(`<a class="modal-link" href="https://www.imdb.com/title/${film.imdb_id}/" target="_blank" rel="noopener">IMDb ↗</a>`);
      if (film.letterboxd_url)
        links.push(`<a class="modal-link" href="${film.letterboxd_url}" target="_blank" rel="noopener">Letterboxd ↗</a>`);
      if (film.screen_australia_url)
        links.push(`<a class="modal-link" href="${film.screen_australia_url}" target="_blank" rel="noopener">Screen Australia ↗</a>`);
      const linksEl = document.getElementById("modal-links");
      linksEl.innerHTML = links.join("");
      linksEl.style.display = links.length ? "flex" : "none";

      overlay.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      overlay.classList.remove("open");
      document.body.style.overflow = "";
    }

    document.getElementById("modal-close").addEventListener("click", closeModal);
    overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    // Open modal on card click — delegated from grid
    document.getElementById("grid").addEventListener("click", e => {
      const card = e.target.closest(".card");
      if (!card) return;
      // Don't open if clicking a link inside the card
      if (e.target.closest("a")) return;
      const idx = parseInt(card.dataset.idx, 10);
      const films = filtered();
      if (films[idx]) openModal(films[idx]);
    });

    loadFilms();
  </script>
</body>
</html>
